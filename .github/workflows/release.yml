name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: deck-darwin-x64.tar.gz
          
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: deck-darwin-arm64.tar.gz
          
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: deck-linux-x64.tar.gz
          
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: deck-windows-x64.zip
          
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: deck-windows-arm64.zip
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true
      
      - name: Install Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install openssl
          echo "OPENSSL_DIR=$(brew --prefix openssl)" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl)/lib/pkgconfig" >> $GITHUB_ENV
      
      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            build-essential
      
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ matrix.os == 'windows-latest' && '-C target-feature=+crt-static' || '' }}
      
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ${{ matrix.artifact }} deck deck-tui
          mv ${{ matrix.artifact }} ../../../
      
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ${{ matrix.artifact }} deck.exe deck-tui.exe
          mv ${{ matrix.artifact }} ../../../
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
      
      - name: Generate Checksum
        run: |
          if [ -f "${{ matrix.artifact }}" ]; then
            echo "📦 Generating checksum for ${{ matrix.artifact }}..."
            if [[ "${{ runner.os }}" == "Windows" ]]; then
              pwsh -Command "Get-FileHash -Algorithm SHA256 '${{ matrix.artifact }}' | ForEach-Object { '{0}  {1}' -f $_.Hash.ToLower(), '${{ matrix.artifact }}' }" >> checksums.txt
            else
              shasum -a 256 "${{ matrix.artifact }}" >> checksums.txt
            fi
            echo "✅ Checksum generated"
          else
            echo "⚠️ Artifact ${{ matrix.artifact }} not found"
            exit 1
          fi
        shell: bash
      
      - name: Upload Checksum
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: checksums.txt

  create-release:
    name: Create Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List Artifacts
        run: |
          echo "📦 Downloaded artifacts:"
          ls -la artifacts/
          find artifacts/ -type f -name "*.tar.gz" -o -name "*.zip" -o -name "checksums.txt" | while read f; do
            echo "  - $f"
          done
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to NPM
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Publish to NPM
        run: |
          cd packages/npm
          npm ci
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}