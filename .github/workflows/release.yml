name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: deck-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: deck-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: deck-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: deck-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: deck-windows-x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: deck-windows-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/deck dist/${{ matrix.artifact }}/
          cp target/${{ matrix.target }}/release/deck-tui dist/${{ matrix.artifact }}/
          cd dist
          tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          mv ${{ matrix.artifact }}.tar.gz ../

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Force -Path "dist\${{ matrix.artifact }}"
          Copy-Item "target\${{ matrix.target }}\release\deck.exe" "dist\${{ matrix.artifact }}\"
          Copy-Item "target\${{ matrix.target }}\release\deck-tui.exe" "dist\${{ matrix.artifact }}\"
          Compress-Archive -Path "dist\${{ matrix.artifact }}" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  create-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > ../checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*
            checksums.txt
          generate_release_notes: true

  publish-npm:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Update package version
        working-directory: packages/npm
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          npm version $VERSION --no-git-tag-version

      - name: Publish to NPM
        working-directory: packages/npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
